<title>

</title>

<body>

<div class="provider-container">

<div class="provider-card">
  
<a href="akun.html" class="back-link">
← Kembali
</a>

<div class="provider-title">
Gabung Menjadi Mitra JasKit
</div>

<div class="provider-info">

<div class="provider-info-title">
Identitas Usaha
</div>

<div class="provider-info-text">
Isi data usaha Anda terlebih dahulu.
Lokasi jasa akan dipilih saat menambahkan jasa, sehingga satu usaha dapat memiliki banyak jasa di lokasi yang berbeda.
</div>

</div>

<label class="provider-label">
Nama Usaha
</label>

<input
class="provider-input"
id="businessName"
placeholder="Contoh: Ratna Music">

<label class="provider-label">
Nomor WhatsApp
</label>

<input
class="provider-input"
id="phone"
placeholder="08xxxxxxxxxx">

<label class="provider-label">
Deskripsi Usaha
</label>

<textarea
class="provider-textarea"
id="description"
placeholder="Contoh: Melayani service AC rumah, kantor, dan ruko sejak 2018.">
</textarea>

<button
class="provider-btn"
id="btnSaveProvider">

Simpan & Lanjut

</button>

</div>

</div>
