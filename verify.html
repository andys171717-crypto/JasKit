<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Verifikasi Akun</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#fff;
font-family:Arial,sans-serif;
}

.box{
text-align:center;
padding:20px;
}

h2{
color:#2563eb;
margin-bottom:10px;
}

p{
color:#666;
}
</style>
</head>

<body>

<div class="box">
<h2>Memverifikasi Akun...</h2>
<p>Mohon tunggu sebentar</p>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";

import {
getAuth,
applyActionCode
}
from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCnk56ZY63q2h1ewEdiivzB0rrSfJOJtYo",
authDomain: "jasaku-92b55.firebaseapp.com",
projectId: "jasaku-92b55",
storageBucket: "jasaku-92b55.firebasestorage.app",
messagingSenderId: "217601622524",
appId: "1:217601622524:web:e3bc48dbdc50d7cb10b279"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const params =
new URLSearchParams(
window.location.search
);

const oobCode =
params.get("oobCode");

if(oobCode){

try{

await applyActionCode(
auth,
oobCode
);

document.querySelector(".box").innerHTML = `

<h2>✅ Email Berhasil Diverifikasi</h2>

<p>
Akun Anda sudah aktif.
</p>

<p>
Silakan kembali ke JasaKu dan login menggunakan email serta password Anda.
</p>

`;

}catch(err){

document.querySelector(".box").innerHTML = `

<h2>❌ Verifikasi Gagal</h2>

<p>${err.message}</p>

`;

}

}
  
else{

window.location.href =
"index.html";

}

</script>

</body>
</html>
