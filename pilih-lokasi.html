<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Pilih Lokasi</title>

<link
rel="stylesheet"
href="styles.css">

<link
rel="stylesheet"
href="pilih-lokasi.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css">

</head>

<body>

<div class="location-page">

<div class="location-header">

<button
id="btnBack"
type="button">

<i class="fa-solid fa-arrow-left"></i>

</button>

<h2>

Pilih Lokasi Jasa

</h2>

</div>

<div
id="map">

</div>

<div class="location-panel">

<div class="location-search">

<input
type="text"
id="searchLocation"
placeholder="Cari alamat...">

<button
type="button"
id="btnMyLocation">

<i class="fa-solid fa-location-crosshairs"></i>

</button>

</div>

<div
id="selectedAddress">

Belum memilih lokasi.

</div>

<button
id="btnGunakanLokasi"
type="button">

Gunakan Lokasi

</button>

</div>

</div>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script
type="module"
src="pilih-lokasi.js">
</script>

</body>

</html>
