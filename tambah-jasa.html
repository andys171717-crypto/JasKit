<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tambah Jasa</title>
  
<link rel="stylesheet" href="styles.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body style="display:none;">

<div class="service-page">

<div class="service-header">

<h1>Tambah Jasa</h1>

<p>
Kelola jasa yang akan ditampilkan di JasKit
</p>

</div>

<div class="service-card">

<label>Nama Jasa</label>

<input
id="namaJasa"
placeholder="Contoh: Service AC">
  
<label>Kategori Jasa</label>

<select id="kategori">

<option value="">
Pilih Kategori
</option>

<option value="AC">
AC
</option>

<option value="Listrik">
Listrik
</option>

<option value="Laptop">
Laptop
</option>

<option value="CCTV">
CCTV
</option>

<option value="Lainnya">
Lainnya
</option>

</select>

<label>Jenis Layanan</label>

<select id="serviceType">

<option value="">
Pilih Jenis Layanan
</option>

<option value="express">
⚡ Ekspres
</option>

<option value="scheduled">
📅 Terjadwal
</option>

<option value="both">
⚡📅 Ekspres & Terjadwal
</option>

</select>

<label>Estimasi Tarif Mulai</label>

<input
id="harga"
placeholder="Contoh: 150000">
  
<label>Alamat Jasa (Opsional)</label>

<input
id="alamatOperasional"
placeholder="Kosongkan jika sama dengan alamat utama">
  
<label>Keterangan Jasa</label>

<textarea
id="deskripsi"
placeholder="Jelaskan pekerjaan yang Anda kerjakan">
</textarea>

<label>Foto Cover Jasa</label>

<div id="serviceImageArea" class="service-image-area">

<img
id="servicePreview"
style="display:none;">

<div id="servicePlaceholder">

<i class="fa-solid fa-image"></i>

<p>Belum ada foto</p>

</div>

<button
type="button"
id="btnPilihFoto">

Pilih Foto

</button>

<input
type="file"
id="serviceImageInput"
accept="image/*"
style="display:none;">

</div>

<button id="btnSimpan">
Simpan Jasa
</button>

</div>

</div>

<script
type="module"
src="tambah-jasa.js">
</script>

<nav class="bottom-nav">

<a href="index.html" class="nav-item">

<i class="fas fa-house"></i>

<small>Beranda</small>

</a>

<a href="index.html" class="nav-item">

<i class="fas fa-magnifying-glass"></i>

<small>Cari</small>

</a>

<a href="pesanan.html" class="nav-item">

<i class="fas fa-clipboard-list"></i>

<small>Pesanan</small>

</a>

<a href="akun.html" class="nav-item active">

<i class="fas fa-user"></i>

<small>Akun</small>

</a>

</nav>


</body>
</html>
